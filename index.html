<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DPS Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #F0F4FF;
      min-height: 100vh;
      color: #1a1a2e;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header {
      background: #0F2044;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(15,32,68,0.4);
    }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4F8EF7, #A78BFA);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }
    .header-text { flex: 1; }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .header-sub   { font-size: 11px; opacity: 0.55; margin-top: 1px; font-weight: 500; }
    .back-btn {
      background: rgba(255,255,255,0.12);
      border: none; color: white;
      width: 34px; height: 34px;
      border-radius: 10px;
      font-size: 18px; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .back-btn:active { background: rgba(255,255,255,0.22); }

    /* ══════════════════════════════════════
       BATCH SELECTION SCREEN
    ══════════════════════════════════════ */
    #batch-screen { padding: 0 0 32px; }

    /* Date Banner */
    .date-banner {
      margin: 16px 16px 0;
      background: linear-gradient(135deg, #0F2044 0%, #1a4080 100%);
      border-radius: 20px;
      padding: 20px 22px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 24px rgba(15,32,68,0.35);
      overflow: hidden;
      position: relative;
    }
    .date-banner::before {
      content: '';
      position: absolute;
      top: -30px; right: -20px;
      width: 130px; height: 130px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .date-banner::after {
      content: '';
      position: absolute;
      bottom: -40px; right: 60px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .banner-left { position: relative; z-index: 1; }
    .banner-day  { font-size: 48px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
    .banner-month { font-size: 15px; font-weight: 600; opacity: 0.8; margin-top: 2px; }
    .banner-weekday { font-size: 11px; font-weight: 600; opacity: 0.5; margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; }
    .banner-right { text-align: right; position: relative; z-index: 1; }
    .banner-progress {
      font-size: 42px; font-weight: 900; line-height: 1; letter-spacing: -2px;
    }
    .banner-progress span { font-size: 20px; font-weight: 600; opacity: 0.6; }
    .banner-prog-label { font-size: 11px; opacity: 0.55; margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

    /* Progress dots */
    .progress-dots {
      display: flex; gap: 5px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .dot.filled { background: #4ADE80; }

    /* Section label */
    .section-label {
      font-size: 11px; font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin: 20px 20px 12px;
    }

    /* Batch Grid */
    .batch-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
    }
    .batch-card {
      border-radius: 18px;
      padding: 20px 16px 18px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .batch-card:active { transform: scale(0.95); }
    .batch-card::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .batch-card.adv-a  { background: linear-gradient(145deg, #1a237e, #3f51b5); }
    .batch-card.adv-b  { background: linear-gradient(145deg, #1b5e20, #43a047); }
    .batch-card.mains  { background: linear-gradient(145deg, #bf360c, #f4511e); }
    .batch-card.neet   { background: linear-gradient(145deg, #880e4f, #d81b60); }
    .batch-card.grade-x  { background: linear-gradient(145deg, #004d61, #0097a7); }
    .batch-card.grade-ix { background: linear-gradient(145deg, #4a148c, #8e24aa); }

    .batch-icon {
      font-size: 32px;
      margin-bottom: 10px;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .batch-name {
      font-size: 15px; font-weight: 800;
      color: white;
      letter-spacing: -0.3px;
    }
    .batch-count {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }

    /* Tick badge */
    .tick-badge {
      position: absolute;
      top: 10px; right: 10px;
      width: 24px; height: 24px;
      background: #4ADE80;
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      color: #14532d;
      font-size: 13px; font-weight: 900;
      box-shadow: 0 2px 8px rgba(74,222,128,0.5);
    }
    .batch-card.done .tick-badge { display: flex; }
    .batch-card.done { opacity: 0.65; }
    .batch-card.done .batch-count { color: #86efac; }

    /* ══════════════════════════════════════
       ATTENDANCE SCREEN
    ══════════════════════════════════════ */
    #attendance-screen { display: none; background: #F0F4FF; min-height: 100vh; }

    /* Summary strip */
    .summary-strip {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e8eef8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .summary-pill {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px; font-weight: 700;
    }
    .summary-pill.present { background: #F0FDF4; color: #15803d; }
    .summary-pill.absent  { background: #FEF2F2; color: #dc2626; }
    .summary-pill .pill-count { font-size: 20px; font-weight: 900; }
    .summary-pill .pill-label { font-size: 11px; opacity: 0.75; }

    /* Student list */
    .student-list { padding: 12px 16px 110px; display: flex; flex-direction: column; gap: 8px; }

    .student-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
      border: 1.5px solid transparent;
    }
    .student-item.absent-row {
      background: #FFF5F5;
      border-color: #fecaca;
    }

    /* Avatar */
    .avatar {
      width: 38px; height: 38px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .student-info { flex: 1; min-width: 0; }
    .student-number { font-size: 10px; font-weight: 600; color: #94a3b8; margin-bottom: 1px; }
    .student-name {
      font-size: 14px; font-weight: 600; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .student-item.absent-row .student-name { color: #991b1b; }

    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .toggle-label {
      font-size: 11px; font-weight: 800;
      min-width: 20px; text-align: center;
      letter-spacing: 0.5px;
    }
    .toggle-label.p { color: #15803d; }
    .toggle-label.a { color: #dc2626; }

    .toggle { position: relative; width: 50px; height: 27px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 27px;
      cursor: pointer;
      transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(34,197,94,0.4);
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 21px; height: 21px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    input:checked + .slider {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 2px 8px rgba(239,68,68,0.4);
    }
    input:checked + .slider:before { transform: translateX(23px); }

    /* Submit bar */
    .submit-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px 20px;
      background: linear-gradient(to top, #F0F4FF 80%, transparent);
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0F2044, #1a4080);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 24px rgba(15,32,68,0.35);
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .submit-btn:active { transform: scale(0.98); box-shadow: 0 4px 12px rgba(15,32,68,0.25); }
    .submit-btn:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: #1e293b;
      color: white;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 13px; font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: linear-gradient(135deg, #15803d, #16a34a); }
    .toast.error   { background: linear-gradient(135deg, #991b1b, #dc2626); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
  <div class="header-logo" id="headerLogo">DPS</div>
  <div class="header-text">
    <div class="header-title" id="headerTitle">DPS Attendance</div>
    <div class="header-sub"  id="headerSub">DPS Whitefield · In-House</div>
  </div>
</div>

<!-- ── BATCH SELECTION SCREEN ── -->
<div id="batch-screen">

  <!-- Date Banner -->
  <div class="date-banner">
    <div class="banner-left">
      <div class="banner-day"     id="bannerDay"></div>
      <div class="banner-month"   id="bannerMonthYear"></div>
      <div class="banner-weekday" id="bannerWeekday"></div>
    </div>
    <div class="banner-right">
      <div class="banner-progress"><span id="doneCount">0</span><span>/6</span></div>
      <div class="banner-prog-label">Batches done</div>
      <div class="progress-dots" id="progressDots">
        <div class="dot" id="dot-0"></div>
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
        <div class="dot" id="dot-3"></div>
        <div class="dot" id="dot-4"></div>
        <div class="dot" id="dot-5"></div>
      </div>
    </div>
  </div>

  <div class="section-label">Select Batch</div>

  <div class="batch-grid">
    <div class="batch-card adv-a"    id="card-XI-Adv A"  onclick="openBatch('XI-Adv A')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">🔬</span>
      <div class="batch-name">XI – Adv A</div>
      <div class="batch-count" id="status-XI-Adv A">36 students</div>
    </div>
    <div class="batch-card adv-b"    id="card-XI-Adv B"  onclick="openBatch('XI-Adv B')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">🧪</span>
      <div class="batch-name">XI – Adv B</div>
      <div class="batch-count" id="status-XI-Adv B">27 students</div>
    </div>
    <div class="batch-card mains"    id="card-XI-Mains"  onclick="openBatch('XI-Mains')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">📐</span>
      <div class="batch-name">XI – Mains</div>
      <div class="batch-count" id="status-XI-Mains">25 students</div>
    </div>
    <div class="batch-card neet"     id="card-XI-NEET"   onclick="openBatch('XI-NEET')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">🩺</span>
      <div class="batch-name">XI – NEET</div>
      <div class="batch-count" id="status-XI-NEET">26 students</div>
    </div>
    <div class="batch-card grade-x"  id="card-Grade X"   onclick="openBatch('Grade X')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">📚</span>
      <div class="batch-name">Grade X</div>
      <div class="batch-count" id="status-Grade X">4 students</div>
    </div>
    <div class="batch-card grade-ix" id="card-Grade IX"  onclick="openBatch('Grade IX')">
      <div class="tick-badge">✓</div>
      <span class="batch-icon">✏️</span>
      <div class="batch-name">Grade IX</div>
      <div class="batch-count" id="status-Grade IX">14 students</div>
    </div>
  </div>
</div>

<!-- ── ATTENDANCE SCREEN ── -->
<div id="attendance-screen">
  <div class="summary-strip">
    <div class="summary-pill present">
      <div>
        <div class="pill-count" id="presentCount">0</div>
        <div class="pill-label">Present</div>
      </div>
    </div>
    <div class="summary-pill absent">
      <div>
        <div class="pill-count" id="absentCount">0</div>
        <div class="pill-label">Absent</div>
      </div>
    </div>
  </div>
  <div class="student-list" id="studentList"></div>
  <div class="submit-bar">
    <button class="submit-btn" id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnF5JmMEb_fx9turFYNiRJNgN2mptZnR6bhRMQxriR5n9E8za5xbsdXK6ppxfVsXai/exec';

  const STUDENTS = {
    'XI-Adv A': [
      "Aarya Sachin Kulkarni","Adhrit Das","Aditya Pandey","Adityaram Arunaachalam",
      "Aksh Raturi","Akshaj Chakrapani","Angel Mary Asish","Angira Roy",
      "Anushree Srenivasan","Avi Mishra","Ayaan Anugrah Lall","Chetan Devireddy",
      "Dhruv Naga Aditya Tiruveedula","Diya Aju","Georgy Oommen George","Ishaan Sibin",
      "Kanav Gupta","Kanisshka B","Krisha Riteshkumar Panchal","Lakshya Kankar",
      "Lakshya Malik","Lipika Panda","Mohammad Aahil Khan","Neel Joshi",
      "Neelakantan Kaplingat","Rajveer Saxena","Rakshitha","Rishabh Mallya H",
      "Ronak Rasindh","Saksham Ranjan","Saniddhya Das","Shashwat Chandra",
      "Shrey Dusad","Sreehari Ravi Prasad","T.R.Easwar","Veda Srishti Dinnepu"
    ],
    'XI-Adv B': [
      "Aadhya Ganesh","Aakriti","Aditya Anand","Ahana Ghosh Roy",
      "Akshay Sathish","Angela Bino","Ankith Nambiar","Ashish Kumar Barik",
      "Athul Mathew","Dhruv Sai Paapisetty","Gagan M.N","Jitesh Karthik",
      "Kabir Yadav","Lalitha Samanvita Matte","Manmay Panda","Naissha Saini",
      "Parameswaran Kaplingat","Piraisoodan","Preya Mankad","Priyasha Rath",
      "Rishita Baruah","Rishitha Reddy Duddukunta","Rithika Reddy Enaganti",
      "Sharada Koona Srinivasan","Shourya Ghosh","Shubh Choudhary","Tanushkaa M"
    ],
    'XI-Mains': [
      "Aarav Dasgupta","Advitha Rohit","Ahan Agarwal","Ajay Madesh",
      "Anwesha Pai","Arshiya Karmakar","Ayanna Samal","Chirantani Ash",
      "Gauransh Kar","Ishita Sharma","Jason Chacko George","Jishnusri Spoorthy Manjuluri",
      "Keshav Syamkumar","Krishna Dash","Louie Mathew","Mayank Praful Lahorkar",
      "Narendran Jayakumar","Praneeth Venkat","Ritwik Guha","S V Niharikha",
      "Samvit Gupta","Shalini T A","Shragvi Parauha","Yash Gupta","Zoya Taj"
    ],
    'XI-NEET': [
      "Aaryan Darsi","Adit Raj","Advika Jha","Akaisha Lilani",
      "Anahita Mathur","Anirjit Chandra","Anirwin Asokane","Anushka Parasher",
      "Arjun Nambiar","Arnav Chaudhary","Arshi Khongal","Bani Samir Mewada",
      "Geena Krish","Harvi Prashant Kumar Kasodariya","Joshua George Mathew","K S Vishnupriya",
      "Krinal Krish K","Medhashree Mohan","Nikhila Shreyasi Adkasthala","P Prarthna",
      "Prarthana N","Siya Sachin Kulkarni","Tadapaneni Khyathi Vaishnavi","Vaibhav Singh",
      "Veda Goberu","Venisha Manjunath"
    ],
    'Grade X':  ["D Manya","Dheer P","Harvy Patel","Mainak Pal"],
    'Grade IX': [
      "Abhilasha Patranabis","Anna Maria Stephen","Ayaan Chaturvedi","Bathuri Saadhvi",
      "Chandana Naga Durga Tiruveedula","Harshit Dey","Javvadi Gopi Saranya",
      "Korlapati Sri Samarth","Niveditha M","Shrish Reddy","Shubhangi Hazarika",
      "Tharunika V G","Thrinesh Bharadwaj","Vippagunta Arnav"
    ]
  };

  // Avatar colours — cycles through based on first letter
  const AVATAR_COLORS = [
    '#4F46E5','#7C3AED','#DB2777','#DC2626','#D97706',
    '#059669','#0891B2','#2563EB','#9333EA','#16A34A'
  ];
  function avatarColor(name) {
    return AVATAR_COLORS[name.charCodeAt(0) % AVATAR_COLORS.length];
  }
  function initials(name) {
    const parts = name.trim().split(' ');
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  let currentBatch = null;

  function getTodayString() {
    const d = new Date();
    return String(d.getDate()).padStart(2,'0') + '-' +
           d.toLocaleString('en-GB',{month:'short'}) + '-' +
           d.getFullYear();
  }

  function getDoneKey()     { return `dps_done_${getTodayString()}`; }
  function getDoneBatches() { return JSON.parse(localStorage.getItem(getDoneKey()) || '[]'); }

  function markBatchDone(batch) {
    const done = getDoneBatches();
    if (!done.includes(batch)) done.push(batch);
    localStorage.setItem(getDoneKey(), JSON.stringify(done));
    refreshDoneUI();
  }

  function refreshDoneUI() {
    const done = getDoneBatches();
    document.getElementById('doneCount').textContent = done.length;

    // Progress dots
    for (let i = 0; i < 6; i++) {
      document.getElementById(`dot-${i}`).className = i < done.length ? 'dot filled' : 'dot';
    }

    Object.keys(STUDENTS).forEach(batch => {
      const card   = document.getElementById(`card-${batch}`);
      const status = document.getElementById(`status-${batch}`);
      if (!card) return;
      if (done.includes(batch)) {
        card.classList.add('done');
        status.textContent = '✓ Done today';
      } else {
        card.classList.remove('done');
      }
    });
  }

  function initDateBanner() {
    const d = new Date();
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    document.getElementById('bannerDay').textContent       = d.getDate();
    document.getElementById('bannerMonthYear').textContent = months[d.getMonth()] + ' ' + d.getFullYear();
    document.getElementById('bannerWeekday').textContent   = days[d.getDay()];
  }

  initDateBanner();
  refreshDoneUI();

  function openBatch(batch) {
    currentBatch = batch;
    const students = STUDENTS[batch];

    document.getElementById('headerTitle').textContent = batch;
    document.getElementById('headerSub').textContent   = getTodayString() + ' · ' + students.length + ' students';
    document.getElementById('headerLogo').textContent  = batch.replace('Grade ','G').replace('XI-','');
    document.getElementById('backBtn').style.display   = 'flex';
    document.getElementById('batch-screen').style.display      = 'none';
    document.getElementById('attendance-screen').style.display = 'block';

    const list = document.getElementById('studentList');
    list.innerHTML = '';

    students.forEach((name, i) => {
      const item = document.createElement('div');
      item.className = 'student-item';
      item.id = `row-${i}`;
      item.innerHTML = `
        <div class="avatar" style="background:${avatarColor(name)}">${initials(name)}</div>
        <div class="student-info">
          <div class="student-number">${String(i+1).padStart(2,'0')}</div>
          <div class="student-name">${name}</div>
        </div>
        <div class="toggle-wrap">
          <span class="toggle-label p" id="lbl-${i}">P</span>
          <label class="toggle">
            <input type="checkbox" id="chk-${i}" onchange="onToggle(${i})" />
            <span class="slider"></span>
          </label>
        </div>`;
      list.appendChild(item);
    });

    updateSummary();
  }

  function onToggle(i) {
    const isAbsent = document.getElementById(`chk-${i}`).checked;
    const lbl = document.getElementById(`lbl-${i}`);
    const row = document.getElementById(`row-${i}`);
    lbl.textContent = isAbsent ? 'A' : 'P';
    lbl.className   = isAbsent ? 'toggle-label a' : 'toggle-label p';
    row.className   = isAbsent ? 'student-item absent-row' : 'student-item';
    updateSummary();
  }

  function updateSummary() {
    const students = STUDENTS[currentBatch];
    let absent = 0;
    students.forEach((_,i) => { if (document.getElementById(`chk-${i}`)?.checked) absent++; });
    document.getElementById('presentCount').textContent = students.length - absent;
    document.getElementById('absentCount').textContent  = absent;
  }

  function goBack() {
    currentBatch = null;
    document.getElementById('headerTitle').textContent = 'DPS Attendance';
    document.getElementById('headerSub').textContent   = 'DPS Whitefield · In-House';
    document.getElementById('headerLogo').textContent  = 'DPS';
    document.getElementById('backBtn').style.display   = 'none';
    document.getElementById('batch-screen').style.display      = 'block';
    document.getElementById('attendance-screen').style.display = 'none';
  }

  async function submitAttendance() {
    const students   = STUDENTS[currentBatch];
    const attendance = students.map((name,i) => ({
      name, status: document.getElementById(`chk-${i}`).checked ? 'A' : 'P'
    }));
    const payload = { batch: currentBatch, date: getTodayString(), attendance };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const res  = await fetch(SCRIPT_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if (json.success) {
        markBatchDone(currentBatch);
        showToast('✓ Attendance submitted!', 'success');
        setTimeout(() => goBack(), 1800);
      } else throw new Error(json.error || 'Unknown error');
    } catch (err) {
      showToast('✗ Failed: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Submit Attendance';
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
